services:
  # ─── 基础依赖 ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-archery}
      POSTGRES_USER: ${POSTGRES_USER:-archery}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-archery123}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-archery}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── 后端服务 ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-archery}:${POSTGRES_PASSWORD:-archery123}@postgres:5432/${POSTGRES_DB:-archery}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-archery}:${POSTGRES_PASSWORD:-archery123}@postgres:5432/${POSTGRES_DB:-archery}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app          # 开发时热重载
      - downloads:/app/downloads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app

  # ─── Celery Worker ───────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-archery}:${POSTGRES_PASSWORD:-archery123}@postgres:5432/${POSTGRES_DB:-archery}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - downloads:/app/downloads
    command: >
      celery -A app.celery_app worker
      --concurrency=4
      -Q default,execute,notify,archive,monitor
      --loglevel=info
      --logfile=/app/logs/celery_worker.log

  # ─── Celery Beat（定时任务）──────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-archery}:${POSTGRES_PASSWORD:-archery123}@postgres:5432/${POSTGRES_DB:-archery}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
    depends_on:
      - redis
      - postgres
    volumes:
      - ./backend:/app
    command: celery -A app.celery_app beat --loglevel=info

  # ─── Flower（Celery 监控）───────────────────────────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis
    command: celery -A app.celery_app flower --port=5555

  # ─── 前端 ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  # ─── 可观测中心 ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=90d"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/rules/:/etc/prometheus/rules/:ro
      - prom_data:/prometheus
    ports:
      - "9090:9090"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    volumes:
      - ./deploy/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"

  grafana:
    image: grafana/grafana:10.4.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: "Archery 2.0"
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: ${GRAFANA_CLIENT_ID:-archery}
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: ${GRAFANA_CLIENT_SECRET:-changeme}
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: "http://backend:8000/api/v1/auth/oauth/authorize"
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: "http://backend:8000/api/v1/auth/oauth/token"
      GF_AUTH_GENERIC_OAUTH_API_URL: "http://backend:8000/api/v1/auth/me"
      GF_USERS_AUTO_ASSIGN_ORG: "true"
      GF_USERS_AUTO_ASSIGN_ORG_ROLE: "Viewer"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning/:/etc/grafana/provisioning/:ro
    ports:
      - "3000:3000"

volumes:
  pg_data:
  redis_data:
  prom_data:
  grafana_data:
  downloads:
