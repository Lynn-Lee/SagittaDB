# ─── SagittaDB 生产环境 Docker Compose ───────────────────────────────────────
# 用法（从项目根目录执行）：
#   docker compose -f deploy/docker-compose.yml up -d
#
# 与根目录 docker-compose.yml（开发版）的区别：
#   - 不挂载本地代码目录，使用镜像内置代码
#   - uvicorn 使用 4 workers，不开 --reload
#   - Celery 并发数提升至 8
#   - 所有服务设置资源限制（limit / reservation）
#   - restart: always（开发版为 unless-stopped）
#   - Grafana 启用 SSO OAuth 集成
#
# 部署前请先配置 .env 文件（参考 .env.example）：
#   SECRET_KEY, POSTGRES_PASSWORD, REDIS_PASSWORD 必须替换
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ─── 基础依赖 ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sagittadb}
      POSTGRES_USER: ${POSTGRES_USER:-sagitta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sagitta123}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-sagitta}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

  # ─── 后端服务 ────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: always
    env_file: ../.env
    environment:
      APP_ENV: production
      DEBUG: "false"
      LOG_LEVEL: WARNING
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sagitta}:${POSTGRES_PASSWORD:-sagitta123}@postgres:5432/${POSTGRES_DB:-sagittadb}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-sagitta}:${POSTGRES_PASSWORD:-sagitta123}@postgres:5432/${POSTGRES_DB:-sagittadb}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - downloads:/app/downloads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  # ─── Celery Worker ───────────────────────────────────────────
  celery_worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: always
    env_file: ../.env
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sagitta}:${POSTGRES_PASSWORD:-sagitta123}@postgres:5432/${POSTGRES_DB:-sagittadb}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - downloads:/app/downloads
    command: >
      celery -A app.celery_app worker
      --concurrency=8
      -Q default,execute,notify,archive,monitor
      --loglevel=warning
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  # ─── Celery Beat ─────────────────────────────────────────────
  celery_beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: always
    env_file: ../.env
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sagitta}:${POSTGRES_PASSWORD:-sagitta123}@postgres:5432/${POSTGRES_DB:-sagittadb}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
    depends_on:
      - redis
      - postgres
    command: celery -A app.celery_app beat --loglevel=warning
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ─── Flower ──────────────────────────────────────────────────
  flower:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: always
    environment:
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis
    command: celery -A app.celery_app flower --port=5555
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ─── 前端 ────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  # ─── 可观测中心 ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    restart: always
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=90d"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules/:/etc/prometheus/rules/:ro
      - prom_data:/prometheus
    ports:
      - "9090:9090"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: always
    volumes:
      - ./prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"

  grafana:
    image: grafana/grafana:10.4.0
    restart: always
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: "SagittaDB"
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: ${GRAFANA_CLIENT_ID:-sagittadb}
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: ${GRAFANA_CLIENT_SECRET:-changeme}
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: "http://backend:8000/api/v1/auth/oauth/authorize"
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: "http://backend:8000/api/v1/auth/oauth/token"
      GF_AUTH_GENERIC_OAUTH_API_URL: "http://backend:8000/api/v1/auth/me"
      GF_USERS_AUTO_ASSIGN_ORG: "true"
      GF_USERS_AUTO_ASSIGN_ORG_ROLE: "Viewer"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/:/etc/grafana/provisioning/:ro
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

volumes:
  pg_data:
  redis_data:
  prom_data:
  grafana_data:
  downloads:
