apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sagittadb.fullname" . }}
  labels:
    {{- include "sagittadb.labels" . | nindent 4 }}
type: Opaque
stringData:
  SECRET_KEY: {{ .Values.app.secretKey | quote }}
  FERNET_KEY: {{ .Values.app.fernetKey | quote }}
  {{- if .Values.postgresql.enabled }}
  DATABASE_URL: {{ printf "postgresql+asyncpg://%s:%s@%s:5432/%s" .Values.postgresql.auth.username .Values.postgresql.auth.password (include "sagittadb.postgresHost" .) .Values.postgresql.auth.database | quote }}
  DATABASE_URL_SYNC: {{ printf "postgresql+psycopg2://%s:%s@%s:5432/%s" .Values.postgresql.auth.username .Values.postgresql.auth.password (include "sagittadb.postgresHost" .) .Values.postgresql.auth.database | quote }}
  {{- else }}
  DATABASE_URL: {{ printf "postgresql+asyncpg://%s:%s@%s:%d/%s" .Values.externalDatabase.username .Values.externalDatabase.password .Values.externalDatabase.host (.Values.externalDatabase.port | int) .Values.externalDatabase.database | quote }}
  DATABASE_URL_SYNC: {{ printf "postgresql+psycopg2://%s:%s@%s:%d/%s" .Values.externalDatabase.username .Values.externalDatabase.password .Values.externalDatabase.host (.Values.externalDatabase.port | int) .Values.externalDatabase.database | quote }}
  {{- end }}
  {{- if .Values.redis.enabled }}
  REDIS_URL: {{ printf "redis://:%s@%s:6379/0" .Values.redis.auth.password (include "sagittadb.redisHost" .) | quote }}
  REDIS_PASSWORD: {{ .Values.redis.auth.password | quote }}
  {{- else }}
  REDIS_URL: {{ printf "redis://:%s@%s:%d/%d" .Values.externalRedis.password .Values.externalRedis.host (.Values.externalRedis.port | int) (.Values.externalRedis.db | int) | quote }}
  REDIS_PASSWORD: {{ .Values.externalRedis.password | quote }}
  {{- end }}
  AI_API_KEY: {{ .Values.app.aiApiKey | quote }}
