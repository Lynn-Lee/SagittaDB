# ─── SagittaDB Helm Chart Default Values ─────────────────────────────────────
# Override in values-staging.yaml / values-prod.yaml

nameOverride: ""
fullnameOverride: ""

# ─── 镜像配置 ──────────────────────────────────────────────────────────────────
image:
  registry: ghcr.io
  repository: your-org/sagittadb
  tag: "1.0.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []

# ─── 后端（FastAPI）────────────────────────────────────────────────────────────
backend:
  replicaCount: 2
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70

# ─── Celery Worker ─────────────────────────────────────────────────────────────
celeryWorker:
  replicaCount: 2
  concurrency: 4
  queues: "default,execute,notify,archive,monitor"
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80

# ─── Celery Beat ───────────────────────────────────────────────────────────────
celeryBeat:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# ─── Flower（Celery 监控）──────────────────────────────────────────────────────
flower:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  service:
    type: ClusterIP
    port: 5555

# ─── 前端（Nginx）──────────────────────────────────────────────────────────────
frontend:
  replicaCount: 2
  image:
    registry: ghcr.io
    repository: your-org/sagittadb-frontend
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# ─── Service ───────────────────────────────────────────────────────────────────
service:
  backend:
    type: ClusterIP
    port: 8000
  frontend:
    type: ClusterIP
    port: 80

# ─── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
  hosts:
    - host: sagittadb.example.com
      paths:
        - path: /api
          pathType: Prefix
          backend: backend
        - path: /
          pathType: Prefix
          backend: frontend
  tls: []
  # - secretName: sagittadb-tls
  #   hosts:
  #     - sagittadb.example.com

# ─── 应用配置 ──────────────────────────────────────────────────────────────────
app:
  env: production
  debug: false
  logLevel: INFO
  secretKey: "CHANGE_ME_USE_RANDOM_32_CHARS_IN_PRODUCTION"
  fernetKey: "CHANGE_ME_GENERATE_WITH_cryptography_fernet"
  accessTokenExpireMinutes: 60
  refreshTokenExpireDays: 7
  tenantId: "1"
  aiProvider: none
  aiApiKey: ""
  prometheusUrl: "http://prometheus:9090"
  alertmanagerUrl: "http://alertmanager:9093"
  storageType: local
  storageLocalPath: /app/downloads

# ─── PostgreSQL（内置 bitnami/postgresql）──────────────────────────────────────
postgresql:
  enabled: true
  auth:
    database: archery
    username: archery
    password: "archery123"
  primary:
    persistence:
      size: 20Gi
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi

# ─── 外部数据库（postgresql.enabled=false 时生效）──────────────────────────────
externalDatabase:
  host: "rds.example.com"
  port: 5432
  database: archery
  username: archery
  password: "CHANGE_ME"

# ─── Redis（内置 bitnami/redis）──────────────────────────────────────────────
redis:
  enabled: true
  auth:
    password: "redis123"
  master:
    persistence:
      size: 5Gi
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  replica:
    replicaCount: 0

# ─── 外部 Redis（redis.enabled=false 时生效）──────────────────────────────────
externalRedis:
  host: "redis.example.com"
  port: 6379
  password: "CHANGE_ME"
  db: 0

# ─── 持久化存储（下载文件）─────────────────────────────────────────────────────
persistence:
  enabled: true
  storageClass: ""
  size: 10Gi
  accessMode: ReadWriteOnce

# ─── Pod 安全 ──────────────────────────────────────────────────────────────────
podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop: [ALL]

# ─── 节点调度 ──────────────────────────────────────────────────────────────────
nodeSelector: {}
tolerations: []
affinity: {}

# ─── 服务账户 ──────────────────────────────────────────────────────────────────
serviceAccount:
  create: true
  annotations: {}
  name: ""
