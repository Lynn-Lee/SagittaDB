global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'instance_id']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      group_wait: 10s
      repeat_interval: 1h

receivers:
  - name: 'default'
    webhook_configs:
      # Archery 平台接收告警并转发到对应资源组通知渠道
      - url: 'http://backend:8000/api/v1/monitor/alerts/webhook'
        send_resolved: true

  - name: 'critical'
    webhook_configs:
      - url: 'http://backend:8000/api/v1/monitor/alerts/webhook'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['instance_id']
