name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── 后端测试 ──────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sagittadb_test
          POSTGRES_USER: sagitta
          POSTGRES_PASSWORD: sagitta123
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check app/ tests/

      - name: Type check (mypy)
        working-directory: backend
        run: mypy app/ --ignore-missing-imports
        continue-on-error: true

      - name: Run unit tests with coverage
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://sagitta:sagitta123@localhost:5432/sagittadb_test
          DATABASE_URL_SYNC: postgresql+psycopg2://sagitta:sagitta123@localhost:5432/sagittadb_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-only
          FERNET_KEY: dGhpcy1pcy1hLXRlc3Qta2V5LWZvci1jaS1vbmx5IQ==
        run: |
          pytest tests/unit/ -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=35 \
            -q

      - name: Run integration tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://sagitta:sagitta123@localhost:5432/sagittadb_test
          DATABASE_URL_SYNC: postgresql+psycopg2://sagitta:sagitta123@localhost:5432/sagittadb_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-only
          FERNET_KEY: dGhpcy1pcy1hLXRlc3Qta2V5LWZvci1jaS1vbmx5IQ==
        run: |
          pytest tests/integration/ -v -q

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage.xml

  # ─── 前端测试 ──────────────────────────────────────────────
  frontend-test:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Type check
        working-directory: frontend
        run: npm run typecheck

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build

  # ─── Docker 构建验证 ────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t sagittadb-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t sagittadb-frontend:ci ./frontend

  # ─── Docker 镜像发布（GHCR）─────────────────────────────────
  docker-publish:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-backend
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Extract Docker metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-frontend
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Helm Chart Lint ────────────────────────────────────────
  helm-lint:
    name: Helm Chart Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Add Bitnami repo
        run: helm repo add bitnami https://charts.bitnami.com/bitnami

      - name: Update Helm dependencies
        working-directory: deploy/helm/sagittadb
        run: helm dependency update

      - name: Lint default values
        working-directory: deploy/helm
        run: helm lint sagittadb/

      - name: Lint staging values
        working-directory: deploy/helm
        run: helm lint sagittadb/ -f sagittadb/values-staging.yaml

      - name: Lint prod values
        working-directory: deploy/helm
        run: helm lint sagittadb/ -f sagittadb/values-prod.yaml

      - name: Template render check
        working-directory: deploy/helm
        run: helm template sagittadb-test sagittadb/ --debug > /dev/null
