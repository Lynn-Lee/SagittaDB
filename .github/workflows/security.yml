name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # 每周一 UTC 02:00 执行定期安全扫描
    - cron: "0 2 * * 1"

jobs:
  # ─── SAST: Bandit 静态安全分析 ──────────────────────────────
  bandit:
    name: Bandit SAST
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit[toml]>=1.7.8

      - name: Run Bandit
        working-directory: backend
        run: |
          bandit -r app/ \
            -x app/tests \
            --severity-level medium \
            --confidence-level medium \
            -f json \
            -o bandit-report.json \
            || true  # 不因发现问题中止 CI，留给 SARIF 上传

      - name: Display Bandit summary
        working-directory: backend
        run: |
          python3 -c "
          import json, sys
          with open('bandit-report.json') as f:
              report = json.load(f)
          results = report.get('results', [])
          high = [r for r in results if r['issue_severity'] == 'HIGH']
          medium = [r for r in results if r['issue_severity'] == 'MEDIUM']
          print(f'HIGH: {len(high)}, MEDIUM: {len(medium)}, TOTAL: {len(results)}')
          if high:
              print('\\n--- HIGH severity issues ---')
              for r in high[:5]:
                  print(f\"  {r['filename']}:{r['line_number']} - {r['issue_text']}\")
          # HIGH 级别问题导致 CI 失败
          sys.exit(1 if high else 0)
          "

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: backend/bandit-report.json

  # ─── 依赖漏洞扫描: pip-audit ────────────────────────────────
  pip-audit:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit>=2.7.0

      - name: Install project dependencies
        working-directory: backend
        run: pip install -e "." --quiet

      - name: Run pip-audit
        working-directory: backend
        run: |
          pip-audit \
            --desc on \
            --format json \
            --output pip-audit-report.json \
            || true

      - name: Check for critical vulnerabilities
        working-directory: backend
        run: |
          python3 -c "
          import json, sys
          try:
              with open('pip-audit-report.json') as f:
                  report = json.load(f)
          except Exception:
              print('No vulnerabilities found or report empty')
              sys.exit(0)

          vulns = report.get('dependencies', [])
          critical = []
          for dep in vulns:
              for v in dep.get('vulns', []):
                  critical.append(f\"{dep['name']} - {v['id']}: {v['description'][:80]}\")

          if critical:
              print(f'Found {len(critical)} vulnerabilities:')
              for c in critical[:10]:
                  print(f'  {c}')
              # 仅警告，不阻断 CI（依赖更新有滞后期）
              print('WARNING: vulnerabilities detected, please update dependencies')
          else:
              print('No known vulnerabilities found')
          "

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report
          path: backend/pip-audit-report.json

  # ─── 容器镜像扫描: Trivy ────────────────────────────────────
  trivy:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    # 仅在 main 分支推送时扫描镜像（PR 阶段跳过镜像构建）
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t sagittadb-backend:scan ./backend

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "sagittadb-backend:scan"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"  # 不因漏洞中止流水线

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true  # 需要仓库开启 Code Scanning 功能
        with:
          sarif_file: "trivy-results.sarif"

  # ─── CodeQL 静态分析 ─────────────────────────────────────────
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        continue-on-error: true  # 需要仓库开启 Code Scanning 功能
        with:
          category: "/language:python"
